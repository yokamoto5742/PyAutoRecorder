[Paths]
# マクロファイル(.par)の保存先フォルダ
par_dir = C:\Shinseikai\PyAutoRecorder\par
# 操作手順書(.md)の保存先フォルダ
manual_dir = C:\Shinseikai\PyAutoRecorder\manual

[Hotkeys]
# pynputのホットキー記法（例: <f10>、<ctrl>+<alt>+p）
play_stop = <f10>
pause = <f11>

[WindowSize]
# 各画面の初期サイズ（幅,高さ）
main = 900,500
workflow_editor = 900,500
workflow_runner = 900,500
item_editor = 900,500

[TrayLauncher]

[Workflow]
# editor=編集モード（作成者向け） / runner=実行専用モード（一般ユーザー向け）
mode = editor
# ワークフロー（.bundle）を配置する院内共有フォルダ
bundle_dir =

[LOGGING]
log_retention_days = 7
log_directory = logs
# DEBUG,INFO,WARNING,ERROR
log_level = INFO
debug_mode = False
project_name = PyAutoRecorder
